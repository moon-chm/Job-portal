{% load static %}
<!DOCTYPE html>

<html>
<head>
	<link rel="stylesheet" href="{% static 'comLogin.css' %}">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<title>Login </title>
</head>
<style>
	h4{
	  color: red;
	  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
	}
  </style>
<body>
	<div class="container" id="container">
		<div class="form-container log-in-container">
			<form  method="POST" action="ComLogin">
				{% csrf_token %}
				<h2>Company Login</h2>
			
				<input type="text" id="userid" name="userid" placeholder="Mobile Number" onkeypress='return (event.charCode >= 48 && event.charCode <= 57) || event.charCode == 46'/>
				<input type="password" id="password" name="password" placeholder="Password" />
			<a href="ComAccount">Create Account ?</a>
			<h4>{{ message }}</h4>
				<button onclick="LoginAccount()">Log In</button>
			</form>
		</div>
		<div class="overlay-container">
			<div class="overlay">
				<div class="overlay-panel overlay-right">
					<h1>Job seekers</h1>
					<p> Find the perfect employer  </p>
				</div>
			</div>
		</div>
	</div>



	<script>
		function LoginAccount(){
			useridjs = document.getElementById("userid").value;
			passwordjs = document.getElementById("password").value;
		
			if (useridjs == "" && passwordjs == "")
			{
				alert("Enter User_id and Password" )
			}
		
		}
		</script>

	
</body>
</html>
